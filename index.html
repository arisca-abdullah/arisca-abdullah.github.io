<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />

    <!-- Fontawesome CSS -->
    <link rel="stylesheet" href="css/all.min.css" />

    <!-- My CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Fontawesome script -->
    <script defer src="js/all.min.js"></script>

    <link class="favicon" rel="shortcut icon" type="image/x-icon" href="img/logo_dark.png" />

    <title>Arisca Abdullah</title>
  </head>
  <body>
    <!-- As a link -->
    <nav class="navbar fixed-top navbar-expand-sm navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="https://arisca-abdullah.github.io">
          <img src="img/logo.png" width="30" height="30" class="d-inline-block align-top" alt="logo">
          Arisca Abdullah
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav ml-auto">
            <a class="nav-item nav-link" id="github-link">My Github</a>
            <a class="nav-item nav-link" id="repos-link">Repositories</a>
          </div>
        </div>
      </div>
    </nav>

    <div class="jumbotron jumbotron-fluid d-flex align-items-center mb-0 py-3">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-4">
            <img class="rounded-circle animate1" />
          </div>
          <div class="col-md-6">
            <h1 class="animate2 name"></h1>
            <p class="animate2-5 loading-location location"></p>
            <p class="animate3 loading-bio bio"></p>
            <p class="animate3-5 loading-extra extra"></p>
            <a
              href="https://github.com/login?return_to=%2Farisca-abdullah"
              class="btn btn-success btn-lg active"
              role="button"
              aria-pressed="true"
              ><i class="fas fa-user-plus"></i> Follow</a
            >
          </div>
        </div>
      </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
      <p class="my-auto">
        <script type="text/javascript">
          document.write(`Copyright &copy; ${new Date().getFullYear()}`);
        </script>
      </p>
    </footer>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>

    <!-- My JavaScript -->
    <script src="js/script.js"></script>
  </body>
</html>
